<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edvault — Навчальний портал</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234F6BF4'/><path d='M8 24.5A2.5 2.5 0 0 1 10.5 22H24M10.5 7H24v18H10.5A2.5 2.5 0 0 1 8 22.5v-13A2.5 2.5 0 0 1 10.5 7z' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    body { overflow: auto; height: auto; min-height: 100vh; }

    /* ── View toggle ── */
    .view-toggle {
      display: flex; align-items: center; gap: 2px;
      padding: 3px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--r); flex-shrink: 0;
    }
    .view-btn {
      width: 28px; height: 26px; border: none; border-radius: 5px;
      background: transparent; color: var(--subtle); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .13s, color .13s;
    }
    .view-btn svg { width: 14px; height: 14px; pointer-events: none; }
    .view-btn:hover { background: var(--surface); color: var(--text); }
    .view-btn.active { background: var(--surface); color: var(--accent); box-shadow: var(--sh-sm); }

    /* ══ GRID VIEW ══════════════════════════════════════════ */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media(max-width:1000px) { .subjects-grid { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:640px)  { .subjects-grid { grid-template-columns: 1fr; } }

    .subj-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); box-shadow: var(--sh-sm);
      overflow: hidden; transition: box-shadow .2s, transform .15s;
    }
    .subj-card:hover { box-shadow: var(--sh); transform: translateY(-2px); }

    .subj-card-head {
      display: flex; align-items: center; gap: 12px;
      padding: 16px; cursor: pointer; user-select: none;
    }
    .subj-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent-bg); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .subj-icon svg { width: 18px; height: 18px; color: var(--accent); }
    .subj-info { flex: 1; min-width: 0; }
    .subj-name { font-size: 14.5px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .subj-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .cat-pill {
      display: inline-flex; align-items: center;
      height: 18px; padding: 0 7px; border-radius: 20px;
      font-size: 10px; font-weight: 600;
      background: var(--accent-bg); color: var(--accent);
    }
    .subj-count { font-size: 11.5px; color: var(--subtle); }
    .subj-chevron { width: 18px; height: 18px; color: var(--subtle); transition: transform .2s; flex-shrink: 0; }
    .subj-card.open .subj-chevron { transform: rotate(90deg); }

    .subj-lessons { display: none; border-top: 1px solid var(--border); }
    .subj-card.open .subj-lessons { display: block; animation: fadeUp .18s ease; }

    .grid-lesson-item {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 16px; text-decoration: none; color: var(--muted);
      font-size: 13px; border-bottom: 1px solid var(--border);
      transition: background .1s, color .1s;
    }
    .grid-lesson-item:last-child { border-bottom: none; }
    .grid-lesson-item:hover { background: var(--accent-bg); color: var(--accent); }
    .grid-lesson-item svg { width: 13px; height: 13px; flex-shrink: 0; color: var(--border2); }
    .grid-lesson-item:hover svg { color: var(--accent-lt); }
    .grid-lesson-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .grid-pages-badge {
      font-size: 10px; color: var(--subtle);
      background: var(--bg); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
    }
    .grid-arr { width: 11px; height: 11px; color: var(--border2); flex-shrink: 0; }
    .grid-no-lessons { padding: 12px 16px; font-size: 12.5px; color: var(--subtle); font-style: italic; }

    /* ══ LIST VIEW ══════════════════════════════════════════ */
    .subjects-list { display: flex; flex-direction: column; }

    .list-subj-row {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .list-subj-row:first-child { border-top: 1px solid var(--border); }

    .list-subj-head {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; cursor: pointer; user-select: none;
      transition: background .1s;
    }
    .list-subj-head:hover { background: var(--bg); }
    .list-subj-icon {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--accent-bg); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .list-subj-icon svg { width: 14px; height: 14px; color: var(--accent); }
    .list-subj-name { font-size: 13.5px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-subj-cat {
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: var(--accent-bg); padding: 2px 8px;
      border-radius: 20px; flex-shrink: 0;
    }
    .list-subj-count { font-size: 12px; color: var(--subtle); flex-shrink: 0; min-width: 80px; text-align: right; }
    .list-chevron { width: 16px; height: 16px; color: var(--subtle); transition: transform .2s; flex-shrink: 0; margin-left: 4px; }
    .list-subj-row.open .list-chevron { transform: rotate(90deg); }

    .list-lessons { display: none; border-top: 1px solid var(--border); background: var(--bg); }
    .list-subj-row.open .list-lessons { display: block; animation: fadeUp .15s ease; }

    .list-lesson-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px 9px 62px;
      text-decoration: none; color: var(--muted);
      font-size: 13px; border-bottom: 1px solid var(--border);
      transition: background .1s, color .1s;
    }
    .list-lesson-item:last-child { border-bottom: none; }
    .list-lesson-item:hover { background: var(--accent-bg); color: var(--accent); }
    .list-lesson-item svg { width: 12px; height: 12px; flex-shrink: 0; color: var(--border2); }
    .list-lesson-item:hover svg { color: var(--accent-lt); }
    .list-lesson-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-pages-badge {
      font-size: 10px; color: var(--subtle);
      background: var(--surface); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
    }
    .list-arr { width: 10px; height: 10px; color: var(--border2); flex-shrink: 0; }
    .list-no-lessons { padding: 9px 20px 9px 62px; font-size: 12px; color: var(--subtle); font-style: italic; }

    /* ══ SHARED ═════════════════════════════════════════════ */
    .portal-empty {
      padding: 60px 20px; text-align: center; color: var(--subtle);
    }
    .portal-empty svg { width: 44px; height: 44px; color: var(--border2); margin: 0 auto 14px; display: block; }
    .portal-empty strong { display: block; font-size: 15px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .portal-empty p { font-size: 13px; line-height: 1.6; }

    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--r);
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .results-count { font-size: 12px; color: var(--subtle); margin-bottom: 12px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }

    @media(max-width:640px) {
      .portal-controls { padding: 12px; gap: 8px; }
      .search-wrap { max-width: 100%; }
      .list-subj-cat { display: none; }
    }
  </style>
</head>

<body class="portal-page">

  <!-- ══ TOP BAR ══════════════════════════════════════════ -->
  <header class="topbar">
    <a href="index.html" class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <span class="brand-name">Edvault</span>
    </a>

    <div class="topbar-div"></div>

    <div class="topbar-actions">
      <div class="view-toggle">
        <button class="view-btn" id="btnGrid" title="Сітка">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="view-btn" id="btnList" title="Список">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ══ SEARCH & FILTER ══════════════════════════════════ -->
  <div class="portal-controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="searchInp" class="search-inp" type="search" placeholder="Пошук предметів…" autocomplete="off" />
    </div>

    <div class="cat-dropdown" id="catDropdown">
      <button class="cat-btn" id="catBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span id="catBtnLabel">Всі категорії</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="cat-menu" id="catMenu" role="listbox"></div>
    </div>
  </div>

  <!-- ══ MAIN ══════════════════════════════════════════════ -->
  <main id="mainWrap" style="padding:20px 20px 60px;">
    <p class="results-count" id="resultsCount"></p>
    <div id="contentArea">
      <!-- Skeleton -->
      <div class="subjects-grid">
        <div class="subj-card" style="padding:16px">
          <div class="skeleton" style="height:40px;border-radius:10px;margin-bottom:12px"></div>
          <div class="skeleton" style="height:13px;width:65%"></div>
        </div>
        <div class="subj-card" style="padding:16px">
          <div class="skeleton" style="height:40px;border-radius:10px;margin-bottom:12px"></div>
          <div class="skeleton" style="height:13px;width:55%"></div>
        </div>
        <div class="subj-card" style="padding:16px">
          <div class="skeleton" style="height:40px;border-radius:10px;margin-bottom:12px"></div>
          <div class="skeleton" style="height:13px;width:70%"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- ══ STATUS BAR ════════════════════════════════════════ -->
  <div class="statusbar" style="position:fixed;bottom:0;left:0;right:0;">
    <span><span class="sb-dot"></span>Firebase Realtime DB</span>
    <span id="sbSubjectCount" style="color:var(--subtle)"></span>
    <span class="sb-right" id="sbTime" style="color:var(--subtle)"></span>
  </div>

  <!-- ══ LOADING OVERLAY ══════════════════════════════════ -->
  <div class="overlay" id="loadOverlay">
    <div class="ov-card">
      <div class="spin"></div>
      <strong>Завантаження…</strong>
      <span>Отримуємо матеріали з бази даних</span>
    </div>
  </div>

  <!-- ══ SCRIPT ════════════════════════════════════════════ -->
  <script type="module">
    import { dbGet, objToArray } from './firebase-config.js';

    let allSubjects   = [];
    let allCategories = {};
    let allLessons    = {};
    let activeCatId   = null;
    let searchQuery   = '';
    let currentView   = localStorage.getItem('edvault_view') || 'grid';

    const area         = document.getElementById('contentArea');
    const searchInp    = document.getElementById('searchInp');
    const catBtn       = document.getElementById('catBtn');
    const catBtnLabel  = document.getElementById('catBtnLabel');
    const catMenu      = document.getElementById('catMenu');
    const catDropdown  = document.getElementById('catDropdown');
    const loadOverlay  = document.getElementById('loadOverlay');
    const resultsCount = document.getElementById('resultsCount');
    const sbCount      = document.getElementById('sbSubjectCount');
    const sbTime       = document.getElementById('sbTime');
    const btnGrid      = document.getElementById('btnGrid');
    const btnList      = document.getElementById('btnList');

    const mainWrap     = document.getElementById('mainWrap');

    const tick = () => sbTime.textContent = new Date().toLocaleTimeString('uk-UA');
    tick(); setInterval(tick, 1000);

    function applyView(v, rerender = false) {
      currentView = v;
      localStorage.setItem('edvault_view', v);
      btnGrid.classList.toggle('active', v === 'grid');
      btnList.classList.toggle('active', v === 'list');
      // Grid: centred max-width container; List: full-width with side padding
      if (v === 'grid') {
        mainWrap.style.maxWidth = '1200px';
        mainWrap.style.margin   = '0 auto';
      } else {
        mainWrap.style.maxWidth = 'none';
        mainWrap.style.margin   = '0';
      }
      if (rerender) render();
    }
    btnGrid.addEventListener('click', () => applyView('grid', true));
    btnList.addEventListener('click', () => applyView('list', true));
    applyView(currentView, false);

    async function bootstrap() {
      loadOverlay.classList.add('show');
      try {
        const [catData, subjData, lessonData] = await Promise.all([
          dbGet('/categories'), dbGet('/subjects'), dbGet('/lessons')
        ]);
        allCategories = catData    || {};
        allLessons    = lessonData || {};
        allSubjects   = objToArray(subjData);
        buildCategoryMenu();
        render();
      } catch (err) {
        console.error(err);
        area.innerHTML = `<div class="portal-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <strong>Помилка завантаження</strong>
          <p>Перевірте конфігурацію Firebase та правила бази даних.</p>
        </div>`;
      } finally {
        loadOverlay.classList.remove('show');
      }
    }

    function buildCategoryMenu() {
      catMenu.innerHTML = '';
      addCatOpt('', 'Всі категорії', null);
      Object.entries(allCategories).forEach(([id, cat]) => addCatOpt(id, cat.name, id));
    }

    function addCatOpt(id, label, catId) {
      const opt = document.createElement('button');
      opt.className = 'cat-opt' + (catId === activeCatId ? ' active' : '');
      opt.textContent = label;
      opt.addEventListener('click', () => {
        activeCatId = catId;
        catBtnLabel.textContent = label;
        catMenu.querySelectorAll('.cat-opt').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        closeDropdown();
        render();
      });
      catMenu.appendChild(opt);
    }

    catBtn.addEventListener('click', () => {
      catMenu.classList.toggle('open');
      catBtn.classList.toggle('open', catMenu.classList.contains('open'));
    });
    document.addEventListener('click', e => { if (!catDropdown.contains(e.target)) closeDropdown(); });
    function closeDropdown() { catMenu.classList.remove('open'); catBtn.classList.remove('open'); }

    searchInp.addEventListener('input', () => { searchQuery = searchInp.value.toLowerCase().trim(); render(); });

    function lessonsFor(sid) {
      return Object.entries(allLessons)
        .filter(([, l]) => l.subjectId === sid)
        .map(([id, l]) => ({ id, ...l, pagesCount: Array.isArray(l.pages) ? l.pages.length : (l.htmlContent ? 1 : 0) }))
        .sort((a, b) => (a.title || '').localeCompare(b.title || '', 'uk'));
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function ukEnd(n, many, one, few) {
      const abs = Math.abs(n) % 100, last = abs % 10;
      if (abs >= 11 && abs <= 19) return many;
      if (last === 1) return one;
      if (last >= 2 && last <= 4) return few;
      return many;
    }

    const BOOK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;
    const DOC_SVG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

    function render() {
      const filtered = allSubjects
        .filter(s => (!activeCatId || s.categoryId === activeCatId)
                  && (!searchQuery || s.name.toLowerCase().includes(searchQuery)))
        .sort((a, b) => a.name.localeCompare(b.name, 'uk'));

      const total = filtered.length;
      sbCount.textContent = `${total} предмет${ukEnd(total, 'ів', '', 'и')}`;
      resultsCount.textContent = total ? `${total} предмет${ukEnd(total, 'ів', '', 'и')} знайдено` : '';

      if (!total) {
        area.innerHTML = `<div class="portal-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <strong>Нічого не знайдено</strong>
          <p>Спробуйте інший пошуковий запит або категорію.</p>
        </div>`;
        return;
      }

      area.innerHTML = '';
      currentView === 'grid' ? renderGrid(filtered) : renderList(filtered);
    }

    /* ── GRID ─────────────────────────────────────────────── */
    function renderGrid(subjects) {
      const grid = document.createElement('div');
      grid.className = 'subjects-grid';

      subjects.forEach(subject => {
        const lessons = lessonsFor(subject.id);
        const catName = allCategories[subject.categoryId]?.name || '';

        const card = document.createElement('div');
        card.className = 'subj-card';

        const head = document.createElement('div');
        head.className = 'subj-card-head';
        head.innerHTML = `
          <div class="subj-icon">${BOOK_SVG}</div>
          <div class="subj-info">
            <div class="subj-name">${esc(subject.name)}</div>
            <div class="subj-meta">
              ${catName ? `<span class="cat-pill">${esc(catName)}</span>` : ''}
              <span class="subj-count">${lessons.length} урок${ukEnd(lessons.length, 'ів', '', 'и')}</span>
            </div>
          </div>
          <svg class="subj-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

        const panel = document.createElement('div');
        panel.className = 'subj-lessons';

        if (!lessons.length) {
          panel.innerHTML = `<div class="grid-no-lessons">Уроків ще немає</div>`;
        } else {
          lessons.forEach(lesson => {
            const a = document.createElement('a');
            a.className = 'grid-lesson-item';
            a.href = `lesson.html?id=${encodeURIComponent(lesson.id)}`;
            const badge = lesson.pagesCount > 1 ? `<span class="grid-pages-badge">${lesson.pagesCount} стор.</span>` : '';
            a.innerHTML = `${DOC_SVG}<span class="grid-lesson-title">${esc(lesson.title || 'Без назви')}</span>${badge}<svg class="grid-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
            panel.appendChild(a);
          });
        }

        head.addEventListener('click', () => card.classList.toggle('open'));
        card.appendChild(head);
        card.appendChild(panel);
        grid.appendChild(card);
      });

      area.appendChild(grid);
    }

    /* ── LIST ─────────────────────────────────────────────── */
    function renderList(subjects) {
      const list = document.createElement('div');
      list.className = 'subjects-list';

      subjects.forEach(subject => {
        const lessons = lessonsFor(subject.id);
        const catName = allCategories[subject.categoryId]?.name || '';

        const row = document.createElement('div');
        row.className = 'list-subj-row';

        const head = document.createElement('div');
        head.className = 'list-subj-head';
        head.innerHTML = `
          <div class="list-subj-icon">${BOOK_SVG}</div>
          <span class="list-subj-name">${esc(subject.name)}</span>
          ${catName ? `<span class="list-subj-cat">${esc(catName)}</span>` : ''}
          <span class="list-subj-count">${lessons.length} урок${ukEnd(lessons.length, 'ів', '', 'и')}</span>
          <svg class="list-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

        const lessonsWrap = document.createElement('div');
        lessonsWrap.className = 'list-lessons';

        if (!lessons.length) {
          lessonsWrap.innerHTML = `<div class="list-no-lessons">Уроків ще немає</div>`;
        } else {
          lessons.forEach(lesson => {
            const a = document.createElement('a');
            a.className = 'list-lesson-item';
            a.href = `lesson.html?id=${encodeURIComponent(lesson.id)}`;
            const badge = lesson.pagesCount > 1 ? `<span class="list-pages-badge">${lesson.pagesCount} стор.</span>` : '';
            a.innerHTML = `${DOC_SVG}<span class="list-lesson-title">${esc(lesson.title || 'Без назви')}</span>${badge}<svg class="list-arr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
            lessonsWrap.appendChild(a);
          });
        }

        head.addEventListener('click', () => row.classList.toggle('open'));
        row.appendChild(head);
        row.appendChild(lessonsWrap);
        list.appendChild(row);
      });

      area.appendChild(list);
    }

    bootstrap();
  </script>
</body>
</html>
