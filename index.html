<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edvault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234F6BF4'/><path d='M8 24.5A2.5 2.5 0 0 1 10.5 22H24M10.5 7H24v18H10.5A2.5 2.5 0 0 1 8 22.5v-13A2.5 2.5 0 0 1 10.5 7z' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

  <style>
    /* Скидання базових стилів */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #f0f2f5; /* Тло як у твоєму оригіналі (var(--bg)) */
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Контейнер для центрування */
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Логотип (іконка) */
    .brand-mark {
      width: 80px;
      height: 80px;
      background: #4F6BF4; /* Оригінальний акцентний колір */
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(79, 107, 244, 0.35);
      
      /* Анімація: назва, тривалість, рівномірність, нескінченність */
      animation: slowRotate 10s linear infinite;
    }

    .brand-mark svg {
      width: 40px;
      height: 40px;
      color: #ffffff;
    }

    /* Текст під логотипом */
    .brand-name {
      font-size: 32px;
      font-weight: 700;
      color: #1a1d23;
      letter-spacing: -0.5px;
    }

    /* Сама анімація обертання */
    @keyframes slowRotate {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    
    <div class="brand-name">Edvault</div>
  </div>

</body>
</html>
