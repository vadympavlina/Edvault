<html lang="uk">
<head>

<meta charset="UTF-8">

<title>Інструменти · Edvault</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f7f8fa;
    --border: #e2e5ea;
    --border2: #d0d5dd;
    --accent: #4F6BF4;
    --accent-light: #eef0fe;
    --accent-hover: #3d57e0;
    --danger: #ef4444;
    --success: #10b981;
    --warn: #f59e0b;
    --text: #1a1d23;
    --text2: #4b5563;
    --muted: #9ca3af;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
    --shadow-lg: 0 24px 60px rgba(0,0,0,.14), 0 4px 16px rgba(0,0,0,.08);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 6px; }

  /* =========== TOPBAR =========== */
  .topbar {
    height: 64px; flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    position: sticky; top: 0; z-index: 30;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(79,107,244,.3); flex-shrink: 0;
  }
  .topbar-logo svg { width: 18px; height: 18px; }
  .topbar-text h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); line-height: 1.2; }
  .topbar-text p { font-size: 11.5px; color: var(--muted); font-weight: 500; margin-top: 1px; }
  .topbar-badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    background: var(--accent-light); color: var(--accent); letter-spacing: .03em;
  }

  /* =========== MAIN =========== */
  .main {
    max-width: 1200px; width: 100%;
    margin: 0 auto;
    padding: 48px 28px 100px;
  }

  /* =========== HERO =========== */
  .hero {
    text-align: center; margin-bottom: 52px;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent); background: var(--accent-light); border: 1px solid #d6dcfd;
    padding: 5px 14px; border-radius: 20px; margin-bottom: 18px;
  }
  .hero-eyebrow span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; animation: dot-blink 1.8s ease-in-out infinite; }
  @keyframes dot-blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .hero h2 {
    font-size: 42px; font-weight: 900; letter-spacing: -1.5px; color: var(--text);
    line-height: 1.1; margin-bottom: 14px;
  }
  .hero h2 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p {
    font-size: 16px; color: var(--text2); max-width: 520px; margin: 0 auto;
    line-height: 1.65; font-weight: 450;
  }

  /* =========== SEARCH =========== */
  .search-wrap {
    max-width: 420px; margin: 0 auto 44px; position: relative;
  }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--muted); pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 12px 14px 12px 40px;
    border: 1.5px solid var(--border2); border-radius: 12px;
    background: var(--surface); font-family: inherit; font-size: 14px; color: var(--text);
    outline: none; transition: all .15s ease;
    box-shadow: var(--shadow-sm);
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,107,244,.1); }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 22px; height: 22px; border-radius: 6px; border: none;
    background: var(--border); color: var(--text2); display: none;
    align-items: center; justify-content: center; cursor: pointer; font-size: 13px;
    transition: background .12s;
  }
  .search-clear:hover { background: var(--border2); }
  .search-clear.visible { display: flex; }

  /* =========== FILTER TABS =========== */
  .filter-tabs {
    display: flex; align-items: center; gap: 6px;
    margin-top: 8px; margin-bottom: 30px; flex-wrap: wrap;
  }
  .filter-tab {
    padding: 7px 16px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text2);
    font-size: 12.5px; font-weight: 600; cursor: pointer;
    transition: all .13s ease; display: flex; align-items: center; gap: 6px;
  }
  .filter-tab:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-tab .count {
    font-size: 10.5px; font-weight: 700; padding: 1px 6px; border-radius: 5px;
    background: rgba(255,255,255,.25); color: inherit;
  }
  .filter-tab:not(.active) .count { background: var(--border); color: var(--muted); }

  /* =========== TOOLS GRID =========== */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 18px;
  }

  /* =========== TOOL CARD =========== */
  .tool-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    cursor: pointer;
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column; gap: 16px;
    transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease, border-color .15s ease;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .tool-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, var(--card-accent-light, rgba(79,107,244,.06)), transparent 65%);
    opacity: 0; transition: opacity .2s ease;
    pointer-events: none;
  }
  .tool-card:hover { transform: translateY(-4px) scale(1.012); box-shadow: var(--shadow-md); border-color: var(--card-accent, var(--accent)); }
  .tool-card:hover::before { opacity: 1; }
  .tool-card:active { transform: translateY(-1px) scale(1.005); }

  .tool-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .tool-icon {
    width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--card-accent-light, var(--accent-light));
    border: 1.5px solid var(--card-accent-border, #d6dcfd);
  }
  .tool-icon svg { width: 22px; height: 22px; color: var(--card-accent, var(--accent)); }

  .tool-tag {
    font-size: 10.5px; font-weight: 700; padding: 4px 9px; border-radius: 7px;
    background: var(--card-accent-light, var(--accent-light));
    color: var(--card-accent, var(--accent)); letter-spacing: .04em; text-transform: uppercase;
    white-space: nowrap;
  }

  .tool-card-body { flex: 1; }
  .tool-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); margin-bottom: 6px; }
  .tool-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .tool-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .tool-open-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12.5px; font-weight: 700; color: var(--card-accent, var(--accent));
    background: var(--card-accent-light, var(--accent-light));
    border: 1.5px solid var(--card-accent-border, #d6dcfd);
    padding: 7px 14px; border-radius: 9px;
    transition: all .13s ease;
  }
  .tool-card:hover .tool-open-btn {
    background: var(--card-accent, var(--accent)); color: #fff; border-color: var(--card-accent, var(--accent));
  }
  .tool-open-btn svg { width: 12px; height: 12px; }
  .tool-file {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600;
    color: var(--muted); background: var(--surface2); border: 1px solid var(--border);
    padding: 4px 9px; border-radius: 7px; letter-spacing: .02em;
  }

  /* =========== EMPTY STATE =========== */
  .empty-state {
    text-align: center; padding: 80px 20px; display: none;
  }
  .empty-state.visible { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 13.5px; color: var(--text2); }

  /* =========== LOADING / ERROR STATE =========== */
  .loading-state, .error-state {
    display: none; text-align: center; padding: 90px 20px;
  }
  .loading-state.visible, .error-state.visible { display: block; }
  .spinner {
    width: 34px; height: 34px; margin: 0 auto 18px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 13.5px; color: var(--text2); font-weight: 500; }
  .error-state .error-icon {
    width: 48px; height: 48px; margin: 0 auto 16px; color: var(--danger);
  }
  .error-state h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .error-state p { font-size: 13.5px; color: var(--text2); margin-bottom: 18px; }
  .retry-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-family: inherit;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: background .13s;
  }
  .retry-btn:hover { background: var(--accent-hover); }

  /* =========== SKELETON CARDS =========== */
  .skeleton-card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px;
    padding: 24px; display: flex; flex-direction: column; gap: 16px; height: 178px;
  }
  .skeleton-line {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%; animation: skeleton-shimmer 1.4s ease-in-out infinite;
    border-radius: 8px;
  }
  @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* =========== STATS BAR =========== */
  .stats-bar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: 12px; margin-bottom: 22px;
  }
  .stats-bar-left { font-size: 13px; color: var(--muted); font-weight: 500; }
  .stats-bar-left b { color: var(--text); font-weight: 700; }
  .stats-bar-right { display: flex; gap: 8px; }
  .view-btn {
    width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .13s ease;
  }
  .view-btn:hover, .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .view-btn svg { width: 15px; height: 15px; }

  /* =========== LIST VIEW =========== */
  .tools-grid.list-view { grid-template-columns: 1fr; gap: 10px; }
  .list-view .tool-card {
    flex-direction: row; align-items: center; gap: 16px; padding: 16px 20px;
  }
  .list-view .tool-card-header { flex-direction: row; align-items: center; flex: 0 0 auto; gap: 14px; }
  .list-view .tool-card-body { flex: 1; }
  .list-view .tool-card-footer { border-top: none; padding-top: 0; flex: 0 0 auto; }
  .list-view .tool-icon { width: 42px; height: 42px; }
  .list-view .tool-tag { display: none; }
  .list-view .tool-card::before { display: none; }

  /* =========== RESPONSIVE =========== */
  @media (max-width: 640px) {
    .main { padding: 32px 16px 80px; }
    .hero h2 { font-size: 30px; }
    .tools-grid { grid-template-columns: 1fr; }
    .list-view .tool-card { flex-wrap: wrap; }
  }

  @keyframes card-appear {
    from { opacity: 0; transform: translateY(16px) scale(.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .tool-card { animation: card-appear .35s cubic-bezier(.16,1,.3,1) both; }
</style>
</head>

    desc: 'Форматований текстовий редактор з темами та стилями. Для написання, редагування й оформлення учнівських робіт.',
    file: 'text-craft.html', tag: 'Творчість', category: 'creative',
    accent: '#8b5cf6', accentLight: 'rgba(139,92,246,.1)', accentBorder: '#ddd6fe',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>'
  },
  'videocut': {
    order: 6, name: 'Відеоредактор',
    desc: 'Нарізка та монтаж відео прямо в браузері. Обрізай, об\u02BCєднуй кліпи і додавай субтитри без зайвих програм.',
    file: 'videocut.html', tag: 'Медіа', category: 'media',
    accent: '#ec4899', accentLight: 'rgba(236,72,153,.1)', accentBorder: '#fbcfe8',
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>'

};

// Людські підписи для відомих категорій; невідомі категорії
// (додані пізніше через базу) підписуються самі собою.
const CATEGORY_LABELS = { media: 'Медіа', class: 'Клас', creative: 'Творчість' };

let TOOLS = [];
let currentFilter = 'all';
let currentSearch = '';
let currentView = 'grid';

async function loadTools() {
  setState('loading');
  try {
    const snap = await get(ref(db, 'tools'));
    let data = snap.exists() ? snap.val() : null;

    // Якщо вузол tools/ ще порожній — засіваємо його дефолтним набором один раз,
    // щоб сторінка не була пустою одразу після підключення до бази.
    if (!data) {
      await set(ref(db, 'tools'), DEFAULT_TOOLS);
      data = DEFAULT_TOOLS;
    }

    TOOLS = Object.entries(data).map(([id, val]) => ({ id, ...val }));
    TOOLS.sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || a.name.localeCompare(b.name, 'uk'));

    buildFilterTabs();
    setState('ready');
    render();
  } catch (err) {
    console.error('Не вдалось завантажити tools/ з Firebase:', err);
    setState('error');
  }
}

function setState(state) {
  document.getElementById('loading-state').classList.toggle('visible', state === 'loading');
  document.getElementById('error-state').classList.toggle('visible', state === 'error');
  document.getElementById('tools-grid').style.display = state === 'ready' ? '' : 'none';
}

function buildFilterTabs() {
  const cats = [];
  TOOLS.forEach(t => { if (t.category && !cats.includes(t.category)) cats.push(t.category); });

  const tabsHtml = [`
    <button class="filter-tab active" data-filter="all" onclick="setFilter('all', this)">
      Всі <span class="count" id="count-all">${TOOLS.length}</span>
    </button>`
  ].concat(cats.map(cat => {
    const count = TOOLS.filter(t => t.category === cat).length;
    const label = CATEGORY_LABELS[cat] || (cat.charAt(0).toUpperCase() + cat.slice(1));
    return `
    <button class="filter-tab" data-filter="${cat}" onclick="setFilter('${cat}', this)">
      ${label} <span class="count" id="count-${cat}">${count}</span>
    </button>`;
  }));

  document.getElementById('filter-tabs').innerHTML = tabsHtml.join('');
}

function render() {
  const grid = document.getElementById('tools-grid');
  const emptyState = document.getElementById('empty-state');

  let filtered = TOOLS.filter(t => {
    const matchFilter = currentFilter === 'all' || t.category === currentFilter;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || (t.tag || '').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById('visible-count').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    emptyState.classList.add('visible');
    return;
  }
  emptyState.classList.remove('visible');

  grid.innerHTML = filtered.map((t, i) => `
    <a class="tool-card" href="tools/${t.file}" style="
      --card-accent: ${t.accent};
      --card-accent-light: ${t.accentLight};
      --card-accent-border: ${t.accentBorder};
      animation-delay: ${i * 55}ms;
    ">
      <div class="tool-card-header">
        <div class="tool-icon">${t.icon}</div>
        <span class="tool-tag">${t.tag}</span>
      </div>
      <div class="tool-card-body">
        <div class="tool-name">${t.name}</div>
        <div class="tool-desc">${t.desc}</div>
      </div>
      <div class="tool-card-footer">
        <div class="tool-open-btn">
          Відкрити
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    </a>
  `).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setView(view) {
  currentView = view;
  const grid = document.getElementById('tools-grid');
  grid.classList.toggle('list-view', view === 'list');
  document.getElementById('grid-btn').classList.toggle('active', view === 'grid');
  document.getElementById('list-btn').classList.toggle('active', view === 'list');
}

// Функції потрібні в inline onclick/oninput-атрибутах —
// у модулях вони не глобальні за замовчуванням, тож виносимо явно.
window.setFilter = setFilter;
window.setView = setView;
window.loadTools = loadTools;

loadTools();
</script>
</body>
